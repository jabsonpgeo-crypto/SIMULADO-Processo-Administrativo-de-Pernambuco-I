<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Interativo</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text: #1f2937;
            --text-muted: #4b5563;
            --correct: #10b981;
            --incorrect: #ef4444;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .quiz-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 550px;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .progress-bar-container {
            background: var(--border);
            height: 8px;
            border-radius: 4px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .status-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        h2 {
            font-size: 1.5rem;
            line-height: 1.3;
            margin-bottom: 24px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: var(--card-bg);
            color: var(--text);
            border: 2px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background-color: #f8fafc;
            transform: translateY(-1px);
        }

        .option-btn:disabled { cursor: not-allowed; }
        .option-btn.correct { background: var(--correct); color: white; border-color: var(--correct); }
        .option-btn.incorrect { background: var(--incorrect); color: white; border-color: var(--incorrect); }

        .result-screen { text-align: center; display: none; }
        .result-screen h2 { margin-bottom: 12px; }
        .score { font-size: 3rem; font-weight: 800; color: var(--primary); margin: 16px 0; }
        
        .action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: background 0.2s;
        }
        .action-btn:hover { background: var(--primary-hover); }
        .hide { display: none; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- Tela de Jogo -->
        <div id="game-screen">
            <div class="status-text">Pergunta <span id="current-index">1</span> de <span id="total-questions">0</span></div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress"></div>
            </div>
            <h2 id="question-text">Carregando pergunta...</h2>
            <div class="options-list" id="options-container"></div>
        </div>

        <!-- Tela de Resultado -->
        <div id="result-screen" class="result-screen">
            <h2>Quiz Concluído!</h2>
            <p>Sua pontuação foi de:</p>
            <div class="score"><span id="correct-answers">0</span>/<span id="total-results">0</span></div>
            <p id="feedback-text"></p>
            <button class="action-btn" onclick="reiniciarQuiz()">Jogar Novamente</button>
        </div>
    </div>

    <script>
        let perguntas = [];
        let indiceAtual = 0;
        let acertos = 0;

        // Busca o JSON no mesmo repositório do GitHub
        fetch('perguntas.json')
            .then(response => response.json())
            .then(data => {
                perguntas = data;
                inicializarQuiz();
            })
            .catch(err => {
                document.getElementById('question-text').innerText = "Erro ao carregar as perguntas.";
                console.error(err);
            });

        function inicializarQuiz() {
            indiceAtual = 0;
            acertos = 0;
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('total-questions').innerText = perguntas.length;
            carregarPergunta();
        }

        function carregarPergunta() {
            const perguntaAtual = perguntas[indiceAtual];
            
            // Atualiza progresso
            document.getElementById('current-index').innerText = indiceAtual + 1;
            const porcentagem = ((indiceAtual) / perguntas.length) * 100;
            document.getElementById('progress').style.width = `${porcentagem}%`;

            // Define o enunciado
            document.getElementById('question-text').innerText = perguntaAtual.pergunta;

            // Limpa e gera as opções de resposta
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            perguntaAtual.opcoes.forEach(opcao => {
                const botao = document.createElement('button');
                botao.className = 'option-btn';
                botao.innerText = opcao;
                botao.onclick = () => verificarResposta(botao, opcao, perguntaAtual.resposta);
                container.appendChild(botao);
            });
        }

        function verificarResposta(botaoSelecionado, opcaoEscolhida, respostaCorreta) {
            const botoes = document.querySelectorAll('.option-btn');
            
            // Bloqueia novos cliques
            botoes.forEach(btn => btn.disabled = true);

            if (opcaoEscolhida === respostaCorreta) {
                botaoSelecionado.classList.add('correct');
                acertos++;
            } else {
                botaoSelecionado.classList.add('incorrect');
                // Mostra qual era a alternativa correta
                botoes.forEach(btn => {
                    if (btn.innerText === respostaCorreta) btn.classList.add('correct');
                });
            }

            // Aguarda 1.5 segundos e avança
            setTimeout(() => {
                indiceAtual++;
                if (indiceAtual < perguntas.length) {
                    carregarPergunta();
                } else {
                    mostrarResultado();
                }
            }, 1500);
        }

        function mostrarResultado() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('correct-answers').innerText = acertos;
            document.getElementById('total-results').innerText = perguntas.length;

            // Mensagem personalizada conforme desempenho
            const aproveitamento = acertos / perguntas.length;
            let mensagem = "Você pode melhorar!";
            if (aproveitamento === 1) mensagem = "Perfeito! Você acertou tudo! 🎉";
            else if (aproveitamento >= 0.7) mensagem = "Muito bom! Ótimo conhecimento. 👍";
            else if (aproveitamento >= 0.5) mensagem = "Bom resultado! Vale a pena revisar. 📝";
            
            document.getElementById('feedback-text').innerText = mensagem;
        }

        function reiniciarQuiz() {
            inicializarQuiz();
        }
    </script>
</body>
</html>
